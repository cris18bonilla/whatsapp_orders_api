<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DEACA Kitchen Display</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial; margin: 16px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap:12px; margin-top:12px;}
    .card { border:1px solid #ddd; border-radius:12px; padding:12px; }
    .ticket { font-size:18px; font-weight:700; }
    .meta { color:#555; font-size:13px; margin-top:4px; }
    ul { margin:8px 0 0 18px; }
    .total { font-weight:700; margin-top:8px; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; border:1px solid #ddd; font-size:12px; color:#333; }
    .topline { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  </style>
</head>
<body>
  <header>
    <div>
      <div style="font-size:20px;font-weight:800;">🍽️ DEACA Kitchen Display</div>
      <div class="meta">Actualiza automáticamente</div>
    </div>
    <div class="badge" id="status">Conectando…</div>
  </header>

  <div class="grid" id="grid"></div>

  <script>
    window.ADMIN_TOKEN = "{{ admin_token }}";
  </script>
  <script src="/static/orders.js"></script>
</body>
</html>
